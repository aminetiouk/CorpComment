<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />

    <script src="script.js" defer></script>
    <title>CorpComment -- Give Feedback, Publicly</title>
  </head>
  <body class="body">
    <div class="body__container">
      <footer class="footer">
        <small class="copyright">
          <p class="copyright__text">
            &copy; Copyright by
            <a href="#" class="copyright__link" target="_blank">amine</a>
            <i class="fa-solid fa-square-up-right copyright__icon"></i>
          </p>
        </small>
      </footer>
      <main class="app">
        <header class="header">
          <a href="#" class="logo"></a>
          <h1 class="first-heading">
            Give Feedback. <span class="u-italic u-transparent">Publicly.</span>
          </h1>
          <form action="#" class="form">
            <textarea
              type="text"
              id="textarea"
              spellcheck="false"
              maxlength="150"
              class="form__textarea"
              placeholder="Enter feedback"
            ></textarea>
            <label for="textarea" class="form__label"
              >Enter your feedback here, remember to
              <span class="u-medium">#hashtag</span>
              <i class="fa-solid fa-pen form__icon"></i>
            </label>
            <div class="form__bottom">
              <p class="counter u-italic">150</p>
              <button class="submit-btn">
                <span class="submit-btn__text">Submit</span>
              </button>
            </div>
          </form>
        </header>
        <ol class="feedbacks">
          <!-- spinner -->
        </ol>
      </main>
    </div>
  </body>
</html>
